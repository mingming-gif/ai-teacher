<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI全科智能学习平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background: #e8e8e8;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #1677ff;
            color: #fff;
        }
        .main-content {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            min-height: 500px;
        }
        .module-title {
            margin-bottom: 20px;
        }
        .book-category {
            font-weight: bold;
            margin: 15px 0 10px;
        }
        .book-item {
            padding: 12px;
            background: #f5f7fa;
            border-radius: 4px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .book-item:hover {
            background: #e6f0ff;
        }
        .reader-container {
            display: none;
        }
        .reader-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .reader-back-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #f0f0f0;
        }
        .reader-content {
            line-height: 1.8;
            padding: 20px;
            background: #fafafa;
            border-radius: 6px;
            white-space: pre-line;
            max-height: 700px;
            overflow-y: auto;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🧠 AI全科智能学习平台</h1>
    <p>完整版书籍阅读 | AI辅导 | 数学资料</p>
</div>

<div id="main-interface">
    <div class="tab-bar">
        <button class="tab-btn" data-tab="课外阅读">课外阅读</button>
        <button class="tab-btn" data-tab="数学书籍">数学书籍</button>
        <button class="tab-btn" data-tab="AI辅导">AI辅导</button>
    </div>
    <div class="main-content" id="main-content"></div>
</div>

<div class="reader-container" id="reader-interface">
    <div class="reader-header">
        <button class="reader-back-btn" onclick="backToMain()">← 返回列表</button>
        <h3 id="reader-title"></h3>
    </div>
    <div class="reader-content" id="reader-content"></div>
</div>

<script src="script.js"></script>
</body>
</html>
